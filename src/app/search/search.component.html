<h1>IP Address Tracker</h1>
<form [formGroup]="form" (ngSubmit)="redirect()">
  <mat-form-field class="form-field" hideRequiredMarker>
    <mat-label class="label">Search for any IP</mat-label>
    <input class="input" matInput formControlName="ip" />
    <button class="button" matSuffix mat-fab>
      <img src="../../assets/images/icon-arrow.svg" alt="Arrow" />
    </button>
  </mat-form-field>
</form>
